<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scammer Hub - Admin Panel</title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            background: linear-gradient(135deg, #000000 0%, #ff6600 100%); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .admin-container {
            background: rgba(0, 0, 0, 0.85);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid #ff6600;
            box-shadow: 0 0 20px rgba(255, 102, 0, 0.5);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        h1 {
            color: #ff6600;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #ff6600;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ff6600;
            background: #111;
            color: white;
            box-sizing: border-box;
            outline: none;
        }

        input:focus {
            box-shadow: 0 0 10px #ff6600;
        }

        button {
            width: 100%;
            padding: 15px;
            background: #ff6600;
            color: black;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background: #fff;
            box-shadow: 0 0 15px #fff;
        }

        #status-msg {
            margin-top: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="admin-container">
        <h1>Admin Panel</h1>
        
        <div class="input-group">
            <label>Scammer Name</label>
            <input type="text" id="scammer-name" placeholder="Enter full name...">
        </div>

        <div class="input-group">
            <label>Image URL</label>
            <input type="text" id="scammer-image" placeholder="https://image-link.com/photo.jpg">
        </div>

        <div class="input-group">
            <label>Redirect/Info URL</label>
            <input type="text" id="scammer-url" placeholder="https://social-link.com/profile">
        </div>

        <button id="btn-add">ADD TO DATABASE</button>
        
        <p id="status-msg"></p>
        
        <a href="index.html" style="color: #ff6600; text-decoration: none; font-size: 12px; display: block; margin-top: 20px;">← Back to Home Page</a>
    </div>

    <!-- FIREBASE MODULE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Your provided Firebase configuration
        const firebaseConfig = {
          apiKey: "AIzaSyDY_qdBhl3OV_Poxw4hUinGkuaVudybQEU",
          authDomain: "scammer-hubby.firebaseapp.com",
          projectId: "scammer-hubby",
          storageBucket: "scammer-hubby.firebasestorage.app",
          messagingSenderId: "343577013334",
          appId: "1:343577013334:web:9d495ca0342ea3972f1ff7",
          measurementId: "G-NCR9S5LLFE"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const scammerCol = collection(db, "scammers");

        const btnAdd = document.getElementById('btn-add');
        const statusMsg = document.getElementById('status-msg');

        btnAdd.addEventListener('click', async () => {
            const name = document.getElementById('scammer-name').value;
            const imageUrl = document.getElementById('scammer-image').value;
            const redirectUrl = document.getElementById('scammer-url').value;

            if(!name || !imageUrl || !redirectUrl) {
                statusMsg.style.color = "red";
                statusMsg.innerText = "Please fill in all fields.";
                return;
            }

            try {
                statusMsg.style.color = "yellow";
                statusMsg.innerText = "Uploading...";
                
                await addDoc(scammerCol, {
                    name: name,
                    imageUrl: imageUrl,
                    redirectUrl: redirectUrl,
                    timestamp: new Date()
                });

                statusMsg.style.color = "#00ff00";
                statusMsg.innerText = "Successfully added to Scammer Hub!";
                
                // Clear inputs
                document.getElementById('scammer-name').value = '';
                document.getElementById('scammer-image').value = '';
                document.getElementById('scammer-url').value = '';
                
            } catch (error) {
                console.error(error);
                statusMsg.style.color = "red";
                statusMsg.innerText = "Error: " + error.message;
            }
        });
    </script>
</body>
</html>
