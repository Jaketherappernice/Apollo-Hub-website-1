<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apollo Hub | Admin Panel</title>
    <style>
        :root {
            --neon-orange: #ff8c00;
            --dark-bg: #121212;
            --surface: #1e1e1e;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--dark-bg);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .admin-container {
            max-width: 900px;
            margin: 0 auto;
            border: 2px solid var(--neon-orange);
            border-radius: 15px;
            padding: 30px;
            background: var(--surface);
            box-shadow: 0 0 20px rgba(255, 140, 0, 0.2);
        }

        h1 {
            color: var(--neon-orange);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: var(--neon-orange);
            margin-bottom: 8px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
            outline: none;
            transition: border 0.3s;
        }

        input:focus {
            border-color: var(--neon-orange);
        }

        .button-row {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:active { transform: scale(0.98); }

        #btn-add { background: var(--neon-orange); color: black; }
        #btn-update { background: #444; color: white; cursor: not-allowed; }
        #btn-delete { background: #b30000; color: white; cursor: not-allowed; }

        .active-btn { cursor: pointer !important; opacity: 1 !important; }
        #btn-update.active-btn { background: #008cff; }

        .preview-box {
            width: 100px;
            height: 100px;
            border: 2px dashed #444;
            border-radius: 12px;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .preview-box img { width: 100%; height: 100%; object-fit: cover; }

        hr { border: 0; border-top: 1px solid #444; margin: 30px 0; }

        .scammer-list-header { color: var(--neon-orange); margin-bottom: 15px; }

        #scammer-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .list-item {
            background: #252525;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid transparent;
            cursor: pointer;
            transition: background 0.2s;
        }

        .list-item:hover { background: #333; border-left-color: var(--neon-orange); }

        .list-item.selected { border-left-color: #008cff; background: #2d2d2d; }

        .status-msg {
            text-align: center;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            display: none;
        }
    </style>
</head>
<body>

<div class="admin-container">
    <h1>Apollo Scammer Admin</h1>
    
    <div id="status" class="status-msg"></div>

    <div class="form-group">
        <label>Scammer Name</label>
        <input type="text" id="name" placeholder="Enter name or alias...">
    </div>

    <div class="form-group">
        <label>Image URL</label>
        <input type="text" id="image-url" placeholder="Paste direct image link (jpg, png, etc)...">
        <div class="preview-box" id="preview-container">
            <span style="color: #666; font-size: 12px;">No Image</span>
        </div>
    </div>

    <div class="form-group">
        <label>Redirect URL (Info Link)</label>
        <input type="text" id="redirect-url" placeholder="https://social-media-link.com/profile">
    </div>

    <div class="button-row">
        <button id="btn-add">Add New</button>
        <button id="btn-update" disabled>Update</button>
        <button id="btn-delete" disabled>Delete</button>
    </div>

    <hr>

    <h3 class="scammer-list-header">Existing Profiles (Click to Edit)</h3>
    <div id="scammer-list">
        <!-- Scammers load here -->
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCp0EIUq7CD0PXFOm6LjxbmdXZw1h_8aLw",
      authDomain: "quick-paste-f4483.firebaseapp.com",
      databaseURL: "https://quick-paste-f4483-default-rtdb.firebaseio.com",
      projectId: "quick-paste-f4483",
      storageBucket: "quick-paste-f4483.firebasestorage.app",
      messagingSenderId: "928918332296",
      appId: "1:928918332296:web:337a5c186e4ec0df51103d",
      measurementId: "G-VT5SFM778L"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const colRef = collection(db, "scammers");

    const nameInput = document.getElementById('name');
    const imgInput = document.getElementById('image-url');
    const linkInput = document.getElementById('redirect-url');
    const previewBox = document.getElementById('preview-container');
    const listDiv = document.getElementById('scammer-list');
    const statusDiv = document.getElementById('status');

    const btnAdd = document.getElementById('btn-add');
    const btnUpdate = document.getElementById('btn-update');
    const btnDelete = document.getElementById('btn-delete');

    let selectedId = null;

    // --- HELPER: Status Message ---
    function showStatus(text, isError = false) {
        statusDiv.innerText = text;
        statusDiv.style.display = 'block';
        statusDiv.style.background = isError ? '#b30000' : '#00b341';
        setTimeout(() => { statusDiv.style.display = 'none'; }, 3000);
    }

    // --- PREVIEW LOGIC ---
    imgInput.addEventListener('input', () => {
        if (imgInput.value) {
            previewBox.innerHTML = `<img src="${imgInput.value}" onerror="this.src='https://via.placeholder.com/100?text=Invalid+URL'">`;
        } else {
            previewBox.innerHTML = `<span style="color: #666; font-size: 12px;">No Image</span>`;
        }
    });

    // --- READ: Real-time List ---
    onSnapshot(colRef, (snapshot) => {
        listDiv.innerHTML = '';
        snapshot.docs.forEach(doc => {
            const data = doc.data();
            const div = document.createElement('div');
            div.className = 'list-item';
            div.innerHTML = `
                <span><strong>${data.name}</strong></span>
                <span style="font-size: 12px; color: #888;">${doc.id.substring(0,6)}...</span>
            `;
            div.onclick = () => selectScammer(doc.id, data);
            listDiv.appendChild(div);
        });
    });

    function selectScammer(id, data) {
        selectedId = id;
        nameInput.value = data.name;
        imgInput.value = data.imageUrl;
        linkInput.value = data.redirectUrl;
        previewBox.innerHTML = `<img src="${data.imageUrl}">`;

        // Enable buttons
        btnUpdate.disabled = false;
        btnDelete.disabled = false;
        btnUpdate.classList.add('active-btn');
        btnDelete.classList.add('active-btn');
        
        // Highlight in list
        document.querySelectorAll('.list-item').forEach(el => el.classList.remove('selected'));
        event.currentTarget.classList.add('selected');
    }

    // --- CREATE ---
    btnAdd.onclick = async () => {
        if (!nameInput.value || !imgInput.value || !linkInput.value) return showStatus("Fill all fields!", true);
        
        try {
            await addDoc(colRef, {
                name: nameInput.value,
                imageUrl: imgInput.value,
                redirectUrl: linkInput.value,
                timestamp: Date.now()
            });
            clearForm();
            showStatus("Scammer Added!");
        } catch (e) { showStatus("Error adding data", true); }
    };

    // --- UPDATE ---
    btnUpdate.onclick = async () => {
        if (!selectedId) return;
        try {
            const docRef = doc(db, "scammers", selectedId);
            await updateDoc(docRef, {
                name: nameInput.value,
                imageUrl: imgInput.value,
                redirectUrl: linkInput.value
            });
            showStatus("Profile Updated!");
            clearForm();
        } catch (e) { showStatus("Update failed", true); }
    };

    // --- DELETE ---
    btnDelete.onclick = async () => {
        if (!selectedId || !confirm("Delete this scammer permanently?")) return;
        try {
            await deleteDoc(doc(db, "scammers", selectedId));
            showStatus("Deleted Successfully");
            clearForm();
        } catch (e) { showStatus("Delete failed", true); }
    };

    function clearForm() {
        nameInput.value = '';
        imgInput.value = '';
        linkInput.value = '';
        previewBox.innerHTML = `<span style="color: #666; font-size: 12px;">No Image</span>`;
        selectedId = null;
        btnUpdate.disabled = true;
        btnDelete.disabled = true;
        btnUpdate.classList.remove('active-btn');
        btnDelete.classList.remove('active-btn');
    }
</script>

</body>
</html>
