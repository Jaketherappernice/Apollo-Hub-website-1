<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scammer Hub - Admin Panel</title>
    <style>
        :root {
            --primary: #ff6600;
            --bg-dark: #0a0a0a;
            --card-bg: rgba(20, 20, 20, 0.95);
        }

        body, html { 
            margin: 0; 
            padding: 0; 
            background: linear-gradient(135deg, #000000 0%, #331a00 100%); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
            min-height: 100vh;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .admin-container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid var(--primary);
            box-shadow: 0 0 30px rgba(255, 102, 0, 0.2);
            width: 100%;
            max-width: 500px;
            margin-bottom: 40px;
        }

        h1, h2 {
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: var(--primary);
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #111;
            color: white;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 8px rgba(255, 102, 0, 0.4);
        }

        .btn-main {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: black;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-main:hover {
            background: #fff;
            transform: translateY(-2px);
        }

        /* Database List Styling */
        .list-container {
            width: 100%;
            max-width: 800px;
        }

        .scammer-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .scammer-card {
            background: var(--card-bg);
            border-left: 4px solid var(--primary);
            padding: 15px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .scammer-card img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary);
        }

        .scammer-info { flex-grow: 1; }
        .scammer-info h3 { margin: 0; font-size: 1.1rem; }
        .scammer-info p { margin: 5px 0 0; font-size: 0.8rem; color: #aaa; overflow-wrap: anywhere; }

        .card-actions {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .btn-edit, .btn-delete {
            padding: 6px 12px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .btn-edit { background: #444; color: white; }
        .btn-edit:hover { background: #666; }
        .btn-delete { background: #8b0000; color: white; }
        .btn-delete:hover { background: #ff0000; }

        #status-msg { text-align: center; margin-top: 15px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="container">
        <div class="admin-container">
            <h1 id="form-title">Admin Panel</h1>
            
            <div class="input-group">
                <label>Scammer Name</label>
                <input type="text" id="scammer-name" placeholder="Enter full name...">
            </div>

            <div class="input-group">
                <label>Image URL</label>
                <input type="text" id="scammer-image" placeholder="https://image-link.com/photo.jpg">
            </div>

            <div class="input-group">
                <label>Redirect/Info URL</label>
                <input type="text" id="scammer-url" placeholder="https://social-link.com/profile">
            </div>

            <button id="btn-save" class="btn-main">ADD TO DATABASE</button>
            <button id="btn-cancel" style="display:none; background: #333; color: white;" class="btn-main">CANCEL EDIT</button>
            
            <p id="status-msg"></p>
            <a href="index.html" style="color: #ff6600; text-decoration: none; font-size: 12px; display: block; text-align: center; margin-top: 20px;">← Back to Home Page</a>
        </div>

        <div class="list-container">
            <h2>Current Database Entries</h2>
            <div id="scammer-display" class="scammer-list">
                <!-- Data will be injected here -->
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { 
            getFirestore, 
            collection, 
            addDoc, 
            onSnapshot, 
            doc, 
            deleteDoc, 
            updateDoc, 
            query, 
            orderBy 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyDY_qdBhl3OV_Poxw4hUinGkuaVudybQEU",
          authDomain: "scammer-hubby.firebaseapp.com",
          projectId: "scammer-hubby",
          storageBucket: "scammer-hubby.firebasestorage.app",
          messagingSenderId: "343577013334",
          appId: "1:343577013334:web:9d495ca0342ea3972f1ff7",
          measurementId: "G-NCR9S5LLFE"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const scammerCol = collection(db, "scammers");

        // DOM Elements
        const nameInput = document.getElementById('scammer-name');
        const imageInput = document.getElementById('scammer-image');
        const urlInput = document.getElementById('scammer-url');
        const btnSave = document.getElementById('btn-save');
        const btnCancel = document.getElementById('btn-cancel');
        const statusMsg = document.getElementById('status-msg');
        const displayArea = document.getElementById('scammer-display');
        const formTitle = document.getElementById('form-title');

        let currentEditingId = null;

        // --- READ: Fetch data in real-time ---
        const q = query(scammerCol, orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            displayArea.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                const card = document.createElement('div');
                card.className = 'scammer-card';
                card.innerHTML = `
                    <img src="${data.imageUrl}" onerror="this.src='https://via.placeholder.com/60?text=User'">
                    <div class="scammer-info">
                        <h3>${data.name}</h3>
                        <p>${data.redirectUrl}</p>
                    </div>
                    <div class="card-actions">
                        <button class="btn-edit" onclick="prepareEdit('${doc.id}', '${data.name}', '${data.imageUrl}', '${data.redirectUrl}')">Edit</button>
                        <button class="btn-delete" onclick="deleteEntry('${doc.id}')">Delete</button>
                    </div>
                `;
                displayArea.appendChild(card);
            });
        });

        // --- CREATE / UPDATE Logic ---
        btnSave.addEventListener('click', async () => {
            const name = nameInput.value;
            const imageUrl = imageInput.value;
            const redirectUrl = urlInput.value;

            if (!name || !imageUrl || !redirectUrl) {
                showMessage("Fill all fields", "red");
                return;
            }

            try {
                if (currentEditingId) {
                    // UPDATE
                    const docRef = doc(db, "scammers", currentEditingId);
                    await updateDoc(docRef, { name, imageUrl, redirectUrl });
                    showMessage("Entry Updated!", "#00ff00");
                } else {
                    // CREATE
                    await addDoc(scammerCol, { name, imageUrl, redirectUrl, timestamp: new Date() });
                    showMessage("Added Successfully!", "#00ff00");
                }
                resetForm();
            } catch (e) {
                showMessage("Error: " + e.message, "red");
            }
        });

        // --- DELETE Logic ---
        window.deleteEntry = async (id) => {
            if(confirm("Are you sure you want to delete this entry?")) {
                try {
                    await deleteDoc(doc(db, "scammers", id));
                    showMessage("Deleted!", "yellow");
                } catch (e) {
                    showMessage("Error deleting", "red");
                }
            }
        };

        // --- PREPARE EDIT Logic ---
        window.prepareEdit = (id, name, img, url) => {
            currentEditingId = id;
            nameInput.value = name;
            imageInput.value = img;
            urlInput.value = url;
            
            formTitle.innerText = "Edit Entry";
            btnSave.innerText = "UPDATE ENTRY";
            btnCancel.style.display = "block";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        // Reset helpers
        function resetForm() {
            currentEditingId = null;
            nameInput.value = '';
            imageInput.value = '';
            urlInput.value = '';
            formTitle.innerText = "Admin Panel";
            btnSave.innerText = "ADD TO DATABASE";
            btnCancel.style.display = "none";
        }

        btnCancel.addEventListener('click', resetForm);

        function showMessage(msg, color) {
            statusMsg.style.color = color;
            statusMsg.innerText = msg;
            setTimeout(() => statusMsg.innerText = "", 3000);
        }
    </script>
</body>
</html>
