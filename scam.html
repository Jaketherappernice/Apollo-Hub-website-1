<body>
    <div id="site-canvas">
        <div id="el-0" class="dropped-element">
            <h2 style="font-size: 44px; color: rgb(0, 0, 0); background-image: url('https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Ftse2.mm.bing.net%2Fth%2Fid%2FOIP.lcuLx4YdhKJdDxaFxHVLwAHaF7%3Fr%3D0%26pid%3DApi&amp;f=1&amp;ipt=3dc6da0c31f24298006fbc053a5f288feec876ca88cf6c44bbd6cb5a23e2be3a&amp;ipo=images'); background-clip: text; -webkit-text-fill-color: transparent; background-size: cover; background-position: center center;">𝚂𝚌𝚊𝚖𝚖𝚎𝚛 𝙷𝚞𝚋</h2>
        </div>

        <!-- Scammer List Container -->

            <div id="scammer-list" style="border: 2px solid rgb(51, 51, 51); background: rgba(0, 0, 0, 0.05); width: 100%; height: 100%; border-radius: 12px;">
                <!-- Scammer entries will be injected here via JS -->

        <div id="el-4" class="dropped-element">

        </div>

        <!-- Search Box -->
        <div id="el-10" class="dropped-element">
            <textarea id="search-box" placeholder="Search by name..." style="border: 1px solid rgb(204, 204, 204); border-radius: 12px; padding: 10px; width: 100%; height: 100%; resize: none; font-size: 14px; color: black;"></textarea>

        <!-- Search Button -->
        <div id="el-12" class="dropped-element">
            <button id="btn-search" style="background: url('https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Ftse1.mm.bing.net%2Fth%2Fid%2FOIP.0KdLlMlStFZ0B0USCObivAHaEk%3Fpid%3DApi&amp;f=1&amp;ipt=05455448d2ed135438a4d56f9e7a141d0335ac31cca8deec0a1488da7c41d2f0&amp;ipo=images') 0% 0% / cover rgb(79, 70, 229); color: white; border: none; border-radius: 12px; width: 100%; height: 100%; cursor: pointer; font-size: 43px;">⌕</button>
        </div>

        <div id="el-11" class="dropped-element">
            <div style="border: 2px solid rgb(51, 51, 51); background: rgba(0, 0, 0, 0.05); width: 100%; height: 100%; border-radius: 12px;"></div>
        </div>

        <div id="el-13" class="dropped-element">
            <div style="padding: 20px; color: #000;">
                <h2>Scammer Hub: A Digital Shield Against Fraud</h2>
                <p>Apollo Hub initiative reflects a broader commitment to digital safety, ensuring that individuals can engage online with greater confidence.</p>
            </div>

    <!-- Firebase Integration -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDY_qdBhl3OV_Poxw4hUinGkuaVudybQEU",
            authDomain: "scammer-hubby.firebaseapp.com",
            projectId: "scammer-hubby",
            storageBucket: "scammer-hubby.firebasestorage.app",
            messagingSenderId: "343577013334",
            appId: "1:343577013334:web:9d495ca0342ea3972f1ff7",
            measurementId: "G-NCR9S5LLFE"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const scammerCol = collection(db, "scammers");

        const listElement = document.getElementById('scammer-list');
        const searchBtn = document.getElementById('btn-search');
        const searchBox = document.getElementById('search-box');

        let allScammers = [];

        // Real-time listener
        onSnapshot(scammerCol, (snapshot) => {
            allScammers = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            displayScammers(allScammers);
        });

        function displayScammers(scammers) {
            listElement.innerHTML = '';
            scammers.forEach((scammer, index) => {
                const card = document.createElement('div');
                card.className = 'scammer-card';
                card.innerHTML = `
                    <img src="${scammer.imageUrl || 'https://via.placeholder.com/150'}" style="width:80px; height:80px; border-radius:12px; object-fit:cover;">
                    <div style="flex-grow:1;">
                        <h3 style="font-size:20px; margin:0 0 10px 0;">${index + 1}. ${scammer.name}</h3>
                        <button onclick="window.open('${scammer.redirectUrl}', '_blank')" style="background:#4f46e5; color:white; padding:8px 12px; border-radius:8px; border:none; cursor:pointer;">𝕊𝕠𝕔𝕚𝕒𝕝 𝕝𝕚𝕟𝕜𝕤 𝕒𝕟𝕕 𝕀𝕟𝕗𝕠𝕣𝕞𝕒𝕥𝕚𝕠𝕟</button>
                    </div>
                `;
                listElement.appendChild(card);
            });
        }

        searchBtn.addEventListener('click', () => {
            const term = searchBox.value.toLowerCase();
            const filtered = allScammers.filter(s => s.name.toLowerCase().includes(term));
            displayScammers(filtered);
        });
    </script>
