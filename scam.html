<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html { margin:0; padding:0; width:100%; min-height:100%; overflow-x:hidden; background:#fff; font-family: sans-serif; }
        #site-canvas { position:relative; width:100%; max-width:1440px; height:1800px; background-image:url("https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Ftse1.mm.bing.net%2Fth%2Fid%2FOIP.0gtDydRfHyNl0ocnAYRyOAHaEc%3Fpid%3DApi&f=1&ipt=b623b623ffee5cc9b46ab949dd634b5cf7d494e56251b5c91a7a1697d0981b88&ipo=images"); background-size:cover; background-position:center; margin:0 auto; overflow:hidden; }
        .dropped-element { position:absolute; display:flex; align-items:center; justify-content:center; box-sizing: border-box; transition: opacity 0.2s; }
        .dropped-element > * { width:100%; height:100%; object-fit:cover; border-radius:12px; border:none; margin:0; box-sizing: border-box; }
        textarea { resize: none; box-sizing: border-box; padding: 10px; }
        button { cursor: pointer; transition: transform 0.1s; background-size: cover; background-position: center; }
        button:active { transform: scale(0.98); }
        
        /* Edit these to change the Name color/spacing globally */
        .scammer-name-text {
            font-size: 46px !important;
            background-image: url("https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Ftse2.mm.bing.net%2Fth%2Fid%2FOIP.zD0TYGY1gkPG974wz1AiYgHaHa%3Fpid%3DApi&f=1&ipt=b29c01575d4ddfbee33e184d3a5d16b4f867db3ef3b326aad0b20b09a868e99d&ipo=images");
            background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: cover;
            margin: 0;
        }

        @media (min-width: 601px) { 
            #site-canvas { width: 100%; } 
            #el-0 { left:1.5625%; top:6px; width:31.0698%; height:69.1302px; z-index:40; }
            #el-1 { left:-22.1094%; top:148px; width:26.5088%; height:399.353px; z-index:40; }
            #el-2 { left:-26.1719%; top:552px; width:25.7333%; height:569.78px; z-index:10; }
            #el-3 { left:5.1820%; top:220.189px; width:90.5211%; height:1434.81px; z-index:10; overflow-y: auto; display: block; }
            #el-4 { left:6.0573%; top:141.082px; width:24.2505%; height:65.1177px; z-index:40; }
            #el-5 { left:34.3958%; top:96.4771px; width:7.5620%; height:115.79px; z-index:40; }
            #el-10 { left:6.7099%; top:275.567px; width:37.3073%; height:52.0078px; z-index:40; }
            #el-11 { left:48.5573%; top:255.567px; width:9.5500%; height:84.675px; z-index:30; }
        }
    </style>
</head>
<body>

<div id="site-canvas">
    <div id="el-0" class="dropped-element">
        <h2 style="font-size: 44px; background-image: url('https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Ftse2.mm.bing.net%2Fth%2Fid%2FOIP.lcuLx4YdhKJdDxaFxHVLwAHaF7%3Fr%3D0%26pid%3DApi&f=1&ipt=3dc6da0c31f24298006fbc053a5f288feec876ca88cf6c44bbd6cb5a23e2be3a&ipo=images'); background-clip: text; -webkit-text-fill-color: transparent; background-size: cover;">𝚂𝚌𝚊𝚖𝚖𝚎𝚛 𝙷𝚞𝚋</h2>
    </div>

    <!-- Search Section -->
    <div id="el-10" class="dropped-element"><textarea id="user-search" placeholder="Enter text..."></textarea></div>
    <div id="el-11" class="dropped-element"><button id="search-btn" style="background: url('https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Ftse1.mm.bing.net%2Fth%2Fid%2FOIP.0KdLlMlStFZ0B0USCObivAHaEk%3Fpid%3DApi&f=1&ipt=05455448d2ed135438a4d56f9e7a141d0335ac31cca8deec0a1488da7c41d2f0&ipo=images') center/cover; color: white;">⌕</button></div>

    <!-- The Container where Scammers appear -->
    <div id="el-3" class="dropped-element">
        <div id="scammer-list-target" style="width:100%;">
            <!-- Firebase items will load here -->
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDY_qdBhl3OV_Poxw4hUinGkuaVudybQEU",
  authDomain: "scammer-hubby.firebaseapp.com",
  projectId: "scammer-hubby",
  storageBucket: "scammer-hubby.firebasestorage.app",
  messagingSenderId: "343577013334",
  appId: "1:343577013334:web:9d495ca0342ea3972f1ff7",
  measurementId: "G-NCR9S5LLFE"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const scammerCol = collection(db, "scammers");

const listTarget = document.getElementById('scammer-list-target');
const searchBox = document.getElementById('user-search');
const searchBtn = document.getElementById('search-btn');

let allScammers = [];

onSnapshot(scammerCol, (snapshot) => {
    allScammers = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    displayScammers(allScammers);
});

function displayScammers(scammers) {
    listTarget.innerHTML = '';
    scammers.forEach((scammer, index) => {
        // This structure uses your EXACT original element layout per item
        const itemWrap = document.createElement('div');
        itemWrap.style.position = "relative";
        itemWrap.style.height = "300px"; // Adjust based on your preferred item spacing
        itemWrap.style.marginBottom = "20px";

        itemWrap.innerHTML = `
            <!-- Background Container (el-6 equivalent) -->
            <div style="position:absolute; left:0; top:0; width:100%; height:100%; border: 2px solid #333; background: rgba(0,0,0,0.05); border-radius:12px;"></div>
            
            <!-- Scammer Name (el-7 equivalent) -->
            <div style="position:absolute; left:2%; top:10%; width:80%; height:70px;">
                <h2 class="scammer-name-text">${index + 1}. ${scammer.name}</h2>
            </div>

            <!-- Social Button (el-8 equivalent) -->
            <div style="position:absolute; left:2%; top:60%; width:200px; height:60px;">
                <button style="background: url('https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Ftse2.mm.bing.net%2Fth%2Fid%2FOIP.Iq8LKG4uOJly28kbKJvmKwHaFj%3Fpid%3DApi&f=1&ipt=c7f6b755e0840548dfad173d73f4d5c95161129f966b096d6494a5e407e5c2f0&ipo=images') center/cover; color: white; border-radius:12px; width:100%; height:100%;" onclick="window.open('${scammer.redirectUrl}', '_blank')">𝕊𝕠𝕔𝕚𝕒𝕝 𝕝𝕚𝕟𝕜𝕤</button>
            </div>

            <!-- Image (el-9 equivalent) -->
            <div style="position:absolute; right:2%; top:10%; width:100px; height:100px;">
                <img src="${scammer.imageUrl || 'https://via.placeholder.com/150'}" style="border-radius:12px; width:100%; height:100%; object-fit:cover;">
            </div>
        `;
        listTarget.appendChild(itemWrap);
    });
}

searchBtn.addEventListener('click', () => {
    const term = searchBox.value.toLowerCase();
    const filtered = allScammers.filter(s => s.name.toLowerCase().includes(term));
    displayScammers(filtered);
});
</script>
</body>
</html>
