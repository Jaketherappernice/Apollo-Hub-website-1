<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scammer Hub</title>
    <style>
        body, html { margin:0; padding:0; width:100%; min-height:100%; overflow-x:hidden; background:#fff; font-family: sans-serif; }
        #site-canvas { position:relative; width:100%; max-width:1440px; height:1800px; background-color:white; background-image:url("https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Ftse1.mm.bing.net%2Fth%2Fid%2FOIP.0gtDydRfHyNl0ocnAYRyOAHaEc%3Fpid%3DApi&f=1&ipt=b623b623ffee5cc9b46ab949dd634b5cf7d494e56251b5c91a7a1697d0981b88&ipo=images"); background-size:cover; background-position:center; margin:0 auto; overflow:hidden; }
        .dropped-element { position:absolute; display:flex; align-items:center; justify-content:center; box-sizing: border-box; transition: opacity 0.2s; }
        .dropped-element > * { width:100%; height:100%; object-fit:cover; border-radius:12px; border:none; margin:0; box-sizing: border-box; }
        textarea { resize: none; box-sizing: border-box; padding: 10px; }
        button { cursor: pointer; transition: transform 0.1s; background-size: cover; background-position: center; }
        button:active { transform: scale(0.98); }

        /* Dynamic List Styling */
        .scammer-entry {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 15px;
            margin-bottom: 15px;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(51, 51, 51, 0.2);
            width: 100%;
        }
        .scammer-info h2 { margin: 0 0 10px 0; font-size: 24px; color: #333; }
        .scammer-btn { 
            background: #4f46e5; 
            color: white; 
            padding: 8px 15px; 
            border-radius: 8px; 
            border: none; 
            cursor: pointer; 
            font-size: 16px;
        }

        @media (min-width: 601px) { 
            #site-canvas { width: 100%; } 
            #el-0 { left:1.5625%; top:6px; width:31.0698%; height:69.1302px; z-index:40 !important; opacity:1; }
            #el-0 > * { font-size:44px !important; }
            #el-1 { left:-22.1094%; top:148px; width:26.5088%; height:399.353px; z-index:40 !important; opacity:1; }
            #el-1 > * { font-size:47px !important; }
            #el-2 { left:-26.1719%; top:552px; width:25.7333%; height:569.78px; z-index:10 !important; opacity:1; }
            #el-3 { left:5.1820%; top:220.189px; width:90.5211%; height:1434.81px; z-index:10 !important; opacity:1; display: block; overflow-y: auto; padding: 20px; }
            #el-4 { left:6.0573%; top:141.082px; width:24.2505%; height:65.1177px; z-index:40 !important; opacity:1; }
            #el-4 > * { font-size:55px !important; }
            #el-5 { left:34.3958%; top:96.4771px; width:7.5620%; height:115.79px; z-index:40 !important; opacity:1; }
            #el-5 > * { font-size:53px !important; }
            #el-6 { left:8.0202%; top:459.542px; width:49.8373%; height:273.507px; z-index:10 !important; opacity:1; }
            #el-7 { left:8.6968%; top:468.672px; width:44.0534%; height:71.4521px; z-index:40 !important; opacity:1; }
            #el-7 > * { font-size:46px !important; }
            #el-8 { left:9.9119%; top:623.328px; width:24.7128%; height:79.3281px; z-index:30 !important; opacity:1; }
            #el-8 > * { font-size:29px !important; }
            #el-9 { left:39.7391%; top:589.314px; width:10.7016%; height:96.3408px; z-index:20 !important; opacity:1; }
            #el-10 { left:6.7099%; top:275.567px; width:37.3073%; height:52.0078px; z-index:40 !important; opacity:1; }
            #el-10 > * { font-size:14px !important; -webkit-text-fill-color: initial !important; background: white !important; }
            #el-11 { left:48.5573%; top:255.567px; width:9.5500%; height:84.675px; z-index:30 !important; opacity:1; }
            #el-11 > * { font-size:43px !important; }
        }

        @media (max-width: 600px) { 
            #site-canvas { width: 100vw; max-width: 100vw; } 
            #el-0 { left:4.1714%; top:26.8645px; width:82.2331%; height:77.4427px; z-index:40 !important; opacity:1; }
            #el-3 { left:5%; top:350px; width:90%; height:1200px; z-index:10 !important; opacity:1; display: block; overflow-y: auto; padding: 10px; }
            #el-10 { left:5%; top:275px; width:70%; height:52px; z-index:40 !important; }
            #el-11 { left:78%; top:255px; width:18%; height:84px; z-index:30 !important; }
        }
    </style>
</head>
<body>

<div id="site-canvas">
    <!-- Header -->
    <div id="el-0" class="dropped-element">
        <h2 style="background-image: url('https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Ftse2.mm.bing.net%2Fth%2Fid%2FOIP.lcuLx4YdhKJdDxaFxHVLwAHaF7%3Fr%3D0%26pid%3DApi&f=1&ipt=3dc6da0c31f24298006fbc053a5f288feec876ca88cf6c44bbd6cb5a23e2be3a&ipo=images'); background-clip: text; -webkit-text-fill-color: transparent; background-size: cover;">𝚂𝚌𝚊𝚖𝚖𝚎𝚛 𝙷𝚞𝚋</h2>
    </div>

    <!-- Titles -->
    <div id="el-4" class="dropped-element">
        <h2 style="background-image: url('https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Ftse2.mm.bing.net%2Fth%2Fid%2FOIP.zD0TYGY1gkPG974wz1AiYgHaHa%3Fpid%3DApi&f=1&ipt=b29c01575d4ddfbee33e184d3a5d16b4f867db3ef3b326aad0b20b09a868e99d&ipo=images'); background-clip: text; -webkit-text-fill-color: transparent; background-size: cover;">Scammers</h2>
    </div>

    <!-- Search Input -->
    <div id="el-10" class="dropped-element">
        <textarea id="search-box" placeholder="Search scammers..."></textarea>
    </div>

    <!-- Search Button -->
    <div id="el-11" class="dropped-element">
        <button id="btn-search" style="background: url('https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Ftse1.mm.bing.net%2Fth%2Fid%2FOIP.0KdLlMlStFZ0B0USCObivAHaEk%3Fpid%3DApi&f=1&ipt=05455448d2ed135438a4d56f9e7a141d0335ac31cca8deec0a1488da7c41d2f0&ipo=images') center/cover; color: white;">⌕</button>
    </div>

    <!-- Main List Container (Dynamic) -->
    <div id="el-3" class="dropped-element">
        <!-- Scammer entries will appear here -->
        <p style="text-align:center; width:100%; color:#666;">Loading Scammers...</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDY_qdBhl3OV_Poxw4hUinGkuaVudybQEU",
        authDomain: "scammer-hubby.firebaseapp.com",
        projectId: "scammer-hubby",
        storageBucket: "scammer-hubby.firebasestorage.app",
        messagingSenderId: "343577013334",
        appId: "1:343577013334:web:9d495ca0342ea3972f1ff7",
        measurementId: "G-NCR9S5LLFE"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const scammerCol = collection(db, "scammers");

    const listElement = document.getElementById('el-3');
    const searchBox = document.getElementById('search-box');
    const searchBtn = document.getElementById('btn-search');

    let allScammers = [];

    // Real-time listener
    onSnapshot(scammerCol, (snapshot) => {
        allScammers = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        displayScammers(allScammers);
    });

    function displayScammers(scammers) {
        listElement.innerHTML = '';
        if (scammers.length === 0) {
            listElement.innerHTML = '<p style="text-align:center; width:100%;">No scammers found.</p>';
            return;
        }

        scammers.forEach((scammer, index) => {
            const card = document.createElement('div');
            card.className = 'scammer-entry';
            card.innerHTML = `
                <img src="${scammer.imageUrl || 'https://via.placeholder.com/150'}" style="width:80px; height:80px; border-radius:12px; object-fit:cover;">
                <div class="scammer-info">
                    <h2>${index + 1}. ${scammer.name}</h2>
                    <button class="scammer-btn" onclick="window.open('${scammer.redirectUrl}', '_blank')">𝕊𝕠𝕔𝕚𝕒𝕝 𝕝𝕚𝕟𝕜𝕤 𝕒𝕟𝕕 𝕀𝕟𝕗𝕠𝕣𝕞𝕒𝕥𝕀𝕠𝕟</button>
                </div>
            `;
            listElement.appendChild(card);
        });
    }

    // Search trigger
    searchBtn.addEventListener('click', () => {
        const term = searchBox.value.toLowerCase();
        const filtered = allScammers.filter(s => s.name.toLowerCase().includes(term));
        displayScammers(filtered);
    });
</script>

</body>
</html>
