<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html { margin:0; padding:0; width:100%; min-height:100%; overflow-x:hidden; background:#fff; font-family: sans-serif; }
        #site-canvas { position:relative; width:100%; max-width:1440px; height:1800px; background-image:url("https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Ftse1.mm.bing.net%2Fth%2Fid%2FOIP.0gtDydRfHyNl0ocnAYRyOAHaEc%3Fpid%3DApi&f=1&ipt=b623b623ffee5cc9b46ab949dd634b5cf7d494e56251b5c91a7a1697d0981b88&ipo=images"); background-size:cover; background-position:center; margin:0 auto; overflow:hidden; }
        .dropped-element { position:absolute; display:flex; align-items:center; justify-content:center; box-sizing: border-box; }
        
        /* EDIT THE NAME STYLE HERE */
        .scammer-name-text {
            font-size: 38px !important; /* Change size */
            color: #ff6600; /* Change fallback color */
            background-image: url("https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Ftse2.mm.bing.net%2Fth%2Fid%2FOIP.zD0TYGY1gkPG974wz1AiYgHaHa%3Fpid%3DApi&f=1&ipt=b29c01575d4ddfbee33e184d3a5d16b4f867db3ef3b326aad0b20b09a868e99d&ipo=images");
            background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: cover;
            margin: 0;
            font-weight: bold;
        }

        /* Desktop Positioning */
        @media (min-width: 601px) {
            #el-0 { left:1.5%; top:10px; width:30%; height:70px; z-index:50; }
            #el-10 { left:6.7%; top:275px; width:37%; height:52px; z-index:50; } /* Search Box */
            #el-11 { left:45%; top:255px; width:10%; height:85px; z-index:50; } /* Search Button */
            
            /* Sided down below the search bar (shifted top to 380px) */
            #el-3 { left:5%; top:380px; width:90%; height:1350px; z-index:10; overflow-y: auto; display: block; }
        }

        /* Mobile Positioning */
        @media (max-width: 600px) {
            #el-0 { left:5%; top:20px; width:90%; height:60px; }
            #el-10 { left:5%; top:120px; width:70%; height:50px; }
            #el-11 { left:78%; top:105px; width:18%; height:75px; }
            #el-3 { left:5%; top:220px; width:90%; height:1400px; overflow-y: auto; display: block; }
        }

        .scammer-card { position:relative; width:100%; height:250px; margin-bottom: 40px; }
        .scammer-bg { position:absolute; inset:0; border: 2px solid #333; background: rgba(0,0,0,0.05); border-radius: 12px; z-index: 1; }
        .scammer-content { position:relative; z-index: 2; padding: 20px; display: flex; justify-content: space-between; height: 100%; box-sizing: border-box; }
        
        textarea { resize: none; border-radius: 12px; padding: 10px; width: 100%; height: 100%; font-size: 14px; }
        button { cursor: pointer; border: none; border-radius: 12px; transition: transform 0.1s; }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div id="site-canvas">
    <!-- Header -->
    <div id="el-0" class="dropped-element">
        <h2 style="font-size: 44px; background-image: url('https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Ftse2.mm.bing.net%2Fth%2Fid%2FOIP.lcuLx4YdhKJdDxaFxHVLwAHaF7%3Fr%3D0%26pid%3DApi&f=1&ipt=3dc6da0c31f24298006fbc053a5f288feec876ca88cf6c44bbd6cb5a23e2be3a&ipo=images'); background-clip: text; -webkit-text-fill-color: transparent; background-size: cover;">𝚂𝚌𝚊𝚖𝚖𝚎𝚛 𝙷𝚞𝚋</h2>
    </div>

    <!-- Search Section -->
    <div id="el-10" class="dropped-element"><textarea id="user-input" placeholder="Search for a name..."></textarea></div>
    <div id="el-11" class="dropped-element"><button id="search-trigger" style="background: url('https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Ftse1.mm.bing.net%2Fth%2Fid%2FOIP.0KdLlMlStFZ0B0USCObivAHaEk%3Fpid%3DApi&f=1&ipt=05455448d2ed135438a4d56f9e7a141d0335ac31cca8deec0a1488da7c41d2f0&ipo=images') center/cover; color: white; width:100%; height:100%;">⌕</button></div>

    <!-- List Container -->
    <div id="el-3" class="dropped-element">
        <div id="fire-list" style="width:100%;"></div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDY_qdBhl3OV_Poxw4hUinGkuaVudybQEU",
  authDomain: "scammer-hubby.firebaseapp.com",
  projectId: "scammer-hubby",
  storageBucket: "scammer-hubby.firebasestorage.app",
  messagingSenderId: "343577013334",
  appId: "1:343577013334:web:9d495ca0342ea3972f1ff7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const scammerCol = collection(db, "scammers");

const listDiv = document.getElementById('fire-list');
const searchInput = document.getElementById('user-input');
const searchBtn = document.getElementById('search-trigger');

let cache = [];

onSnapshot(scammerCol, (snap) => {
    cache = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    render(cache);
});

function render(data) {
    listDiv.innerHTML = '';
    data.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = 'scammer-card';
        div.innerHTML = `
            <div class="scammer-bg"></div>
            <div class="scammer-content">
                <div style="flex: 1;">
                    <h2 class="scammer-name-text">${i + 1}. ${item.name}</h2>
                    <button style="margin-top:20px; padding: 12px 20px; background: #4f46e5; color: white; font-size: 18px;" onclick="window.open('${item.redirectUrl}', '_blank')">𝕊𝕠𝕔𝕚𝕒𝕝 𝕝𝕚𝕟𝕜𝕤</button>
                </div>
                <img src="${item.imageUrl || 'https://via.placeholder.com/150'}" style="width:120px; height:120px; border-radius:12px; object-fit:cover; margin-left: 20px;">
            </div>
        `;
        listDiv.appendChild(div);
    });
}

searchBtn.addEventListener('click', () => {
    const val = searchInput.value.toLowerCase();
    render(cache.filter(s => s.name.toLowerCase().includes(val)));
});
</script>

</body>
</html>
