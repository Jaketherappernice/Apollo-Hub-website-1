        <div id="el-4" class="dropped-element"><h2 style="font-size: 55px; color: rgb(0, 0, 0); background-image: url('https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Ftse2.mm.bing.net%2Fth%2Fid%2FOIP.zD0TYGY1gkPG974wz1AiYgHaHa%3Fpid%3DApi&amp;f=1&amp;ipt=b29c01575d4ddfbee33e184d3a5d16b4f867db3ef3b326aad0b20b09a868e99d&amp;ipo=images'); background-clip: text; -webkit-text-fill-color: transparent; background-size: cover; background-position: center center;">Scammers</h2></div>

    <!-- FIREBASE MODULE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Your provided Firebase configuration
        const firebaseConfig = {
          apiKey: "AIzaSyCp0EIUq7CD0PXFOm6LjxbmdXZw1h_8aLw",
          authDomain: "quick-paste-f4483.firebaseapp.com",
          databaseURL: "https://quick-paste-f4483-default-rtdb.firebaseio.com",
          projectId: "quick-paste-f4483",
          storageBucket: "quick-paste-f4483.firebasestorage.app",
          messagingSenderId: "928918332296",
          appId: "1:928918332296:web:337a5c186e4ec0df51103d",
          measurementId: "G-VT5SFM778L"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const scammerCol = collection(db, "scammers");

        const listElement = document.getElementById('scammer-list');
        const searchBtn = document.getElementById('btn-search');
        const searchBox = document.getElementById('search-box');

        let allScammers = [];

        // Real-time listener for updates
        onSnapshot(scammerCol, (snapshot) => {
            allScammers = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            displayScammers(allScammers);
        });

        function displayScammers(scammers) {
            listElement.innerHTML = '';
            scammers.forEach((scammer, index) => {
                const card = document.createElement('div');
                card.className = 'scammer-entry';
                card.innerHTML = `
                    <img src="${scammer.imageUrl || 'https://via.placeholder.com/150'}" style="width:100px; height:100px; border-radius:12px; object-fit:cover;">
                    <div style="flex-grow:1;">
                        <h2 style="font-size:24px; margin:0 0 10px 0;">${index + 1}. ${scammer.name}</h2>
                        <button onclick="window.open('${scammer.redirectUrl}', '_blank')" style="background:#4f46e5; color:white; padding:10px 15px; border-radius:8px; width:auto; height:auto; cursor:pointer;">𝕊𝕠𝕔𝕚𝕒𝕝 𝕝𝕚𝕟𝕜𝕤 𝕒𝕟𝕕 𝕀𝕟𝕗𝕠𝕣𝕞𝕒𝕥𝕚𝕠𝕟</button>
                    </div>
                `;
                listElement.appendChild(card);
            });
        }

        // Search logic
        searchBtn.addEventListener('click', () => {
            const term = searchBox.value.toLowerCase();
            const filtered = allScammers.filter(s => s.name.toLowerCase().includes(term));
            displayScammers(filtered);
        });
    </script>
