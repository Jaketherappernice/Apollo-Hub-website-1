 }

</head>
<body>

        <div id="el-0" class="dropped-element"><h2 style="font-size: 44px; color: rgb(0, 0, 0); background-image: url('https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Ftse2.mm.bing.net%2Fth%2Fid%2FOIP.lcuLx4YdhKJdDxaFxHVLwAHaF7%3Fr%3D0%26pid%3DApi&amp;f=1&amp;ipt=3dc6da0c31f24298006fbc053a5f288feec876ca88cf6c44bbd6cb5a23e2be3a&amp;ipo=images'); background-clip: text; -webkit-text-fill-color: transparent; background-size: cover; background-position: center center;">𝚂𝚌𝚊𝚖𝚖𝚎𝚛 𝙷𝚞𝚋</h2></div>

        <!-- Main Scrollable List -->
        <div id="el-3" class="dropped-element">
            <div id="scammer-list-content"></div>
        </div>

        <div id="el-4" class="dropped-element"><h2 style="font-size: 55px; color: rgb(0, 0, 0); background-image: url('https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Ftse2.mm.bing.net%2Fth%2Fid%2FOIP.zD0TYGY1gkPG974wz1AiYgHaHa%3Fpid%3DApi&amp;f=1&amp;ipt=b29c01575d4ddfbee33e184d3a5d16b4f867db3ef3b326aad0b20b09a868e99d&amp;ipo=images'); background-clip: text; -webkit-text-fill-color: transparent; background-size: cover; background-position: center center;">Scammers</h2></div>

        <div id="el-12" class="dropped-element"><button id="search-btn" style="background: url('https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Ftse1.mm.bing.net%2Fth%2Fid%2FOIP.0KdLlMlStFZ0B0USCObivAHaEk%3Fpid%3DApi&amp;f=1&amp;ipt=05455448d2ed135438a4d56f9e7a141d0335ac31cca8deec0a1488da7c41d2f0&amp;ipo=images') 0% 0% / cover rgb(79, 70, 229); color: white; border: none; border-radius: 12px; width: 100%; height: 100%; cursor: pointer; font-size: 43px;">⌕</button></div>

        <!-- INFO SECTION -->
        <div id="el-13" class="dropped-element">

                <p>## Scammer Hub: A Digital Shield Against Fraud... (content preserved)</p>

    <!-- FIREBASE MODULE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCp0EIUq7CD0PXFOm6LjxbmdXZw1h_8aLw",
            authDomain: "quick-paste-f4483.firebaseapp.com",
            projectId: "quick-paste-f4483",
            storageBucket: "quick-paste-f4483.firebasestorage.app",
            messagingSenderId: "928918332296",
            appId: "1:928918332296:web:337a5c186e4ec0df51103d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const scammerCol = collection(db, "scammers");

        const listContainer = document.getElementById('scammer-list-content');
        const searchInput = document.getElementById('search-input');
        const searchBtn = document.getElementById('search-btn');

        let allScammers = [];

        // Real-time listener
        onSnapshot(scammerCol, (snapshot) => {
            allScammers = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            render(allScammers);
        });

        function render(data) {
            listContainer.innerHTML = '';
            data.forEach((scammer, index) => {
                // We recreate your el-6, el-7, el-8, el-9 design for each scammer
                const card = document.createElement('div');
                card.className = 'scammer-card';
                card.innerHTML = `
                    <div style="position:absolute; left:0; top:0; width:85%; height:100%; border: 2px solid rgb(51, 51, 51); background: rgba(0, 0, 0, 0.05); border-radius: 12px; z-index:10;"></div>
                    <h2 style="position:absolute; left:5%; top:16px; width:75%; font-size: 46px; color: black; z-index:40; margin:0;">${index + 1}. ${scammer.name}</h2>
                    <button style="position:absolute; left:3%; top:181px; width:45%; height:79px; background: #4f46e5; color: white; border-radius: 12px; z-index:30; font-size: 29px; cursor:pointer;" onclick="window.open('${scammer.redirectUrl}', '_blank')">𝕊𝕠𝕔𝕚𝕒𝕝 𝕝𝕚𝕟𝕜𝕤 𝕒𝕟𝕕 𝕀𝕟𝕗𝕠𝕣𝕞𝕒𝕥𝕚𝕠𝕟</button>
                    <img src="${scammer.imageUrl}" style="position:absolute; left:65%; top:20px; width:100px; height:100px; border-radius: 12px; z-index:20; object-fit:cover;">
                `;
                listContainer.appendChild(card);
            });
        }

        // Search logic
        searchBtn.onclick = () => {
            const term = searchInput.value.toLowerCase();
            const filtered = allScammers.filter(s => s.name.toLowerCase().includes(term));
            render(filtered);
        };
    </script>
